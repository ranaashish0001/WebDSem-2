<!DOCTYPE html>
<html>
<head>
<title>Temperature Converter</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial;
        background: #f0f0f0;
    }

    .box {
        background: white;
        padding: 25px;
        border-radius: 10px;
        text-align: center;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
        width: 280px;
    }

    input {
        padding: 10px;
        width: 90%;
        margin: 10px 0;
        font-size: 16px;
    }
    

    
</style>

</head>

<body>

<div class="box">
    <h2>Temperature Converter</h2>

    <input id="celsius" placeholder="Enter Celsius">

    <br>

    <button onclick="convert()">Convert</button>

    <p id="result"></p>
</div>

<script>
function convert() {
    let c = Number(document.getElementById("celsius").value);
    let r = document.getElementById("result");

    if (document.getElementById("celsius").value === "") {
        r.textContent = "Please enter a value";
        return;
    }

    let f = (c * 9/5) + 32;
    r.textContent = `${c}°C = ${f}°F`;
}
</script>

</body>
</html>
