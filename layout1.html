<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Layout</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Arial, sans-serif;
        }

        .header{
            border:2px solid black;
            text-align:center;
            padding:20px;
            font-size:28px;
            font-weight:bold;
        }

        .navbar{
            border-left:2px solid black;
            border-right:2px solid black;
            border-bottom:2px solid black;
            text-align:center;
            padding:15px;
            font-size:24px;
            font-weight:bold;
        }

        .main{
            display:flex;
            border-left:2px solid black;
            border-right:2px solid black;
            border-bottom:2px solid black;
            height:300px;
        }

        .links{
            width:20%;
            border-right:2px solid black;
            text-align:center;
            padding-top:120px;
            font-size:24px;
            font-weight:bold;
        }

        .content{
            width:80%;
            text-align:center;
            padding-top:120px;
            font-size:28px;
            font-weight:bold;
        }

        .footer{
            border-left:2px solid black;
            border-right:2px solid black;
            border-bottom:2px solid black;
            text-align:center;
            padding:20px;
            font-size:28px;
            font-weight:bold;
        }
    </style>
</head>

<body>

    <div class="header">
        Header Section
    </div>

    <div class="navbar">
        Navigation Bar
    </div>

    <div class="main">

        <div class="links">
            Links
        </div>

        <div class="content">
            Content area
        </div>

    </div>

    <div class="footer">
        Footer Section
    </div>

</body>
</html>
