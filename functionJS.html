<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>function in JS</title>
</head>
<body>
    <script>
        //Normal functioin
        function demo(){
            console.log("Hello ABES");
        }
        demo();

        //with paramiteres
        function cal(a,b){
            var num1=a;
            var num2=b;
            console.log("Addition of two number is "+ (num1+num2));
        }
        cal(3,5);

        //with default parameter
        
        function calc(a,b=5){
            var num1=a;
        var num2=b;
            var res1=num1+num2;
            console.log("Additon is "+res1);
        }
        function mul(a,b=8){
            var num1=a;
        var num2=b;
            var res2=num1*num2;
            console.log("Multiplication is "+res2);
        }
        function div(a,b=6){
            var num1=a;
        var num2=b;
            var res3=num1/num2;
            console.log("Division is "+res3);
        }
        calc(10,23);
        div(30);
        mul(20);

        //annoymous function
        // let demo1=function(){
        //     console.log("Hello Abes");
        // }
        // demo1();

        // //short way to write aboce functoin i.e. arrow function 
        // let demo1=()=>{
        //     console.log("Hello JS");
        // }
        // demo1();
        
        //above function in single line 
        let demo1=()=>console.log("Hello Java script");
        demo1();

        //Immediate Invoked Function (IFEF)
        (function(){
            console.log("IFEF in JS")
        })();

        // callback function in JavaScript
        // that is passed as an argument to another function


        //callback in Synchronous 
        function addRes(a,b,callback){
            var res=a+b;
            callback(res);
        }

        function result(res){
            console.log("Addition of two num is "+ res)
        }

        addRes(10,20,result);
    </script>
</body>  
</html>
