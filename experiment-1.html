<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Webpage</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
            font-family: Arial, sans-serif;
        }

        .box {
            border-radius: 12px;
            padding: 30px;
            margin-top: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
        }

        header,
        footer {
            color: white;
        }

        nav {
            border-radius: 10px;
            margin-top: 10px;
        }

        section,
        aside {
            min-height: 250px;
        }

        .navbar-nav .nav-link {
            color: white !important;
            margin-right: 10px;
            transition: 0.3s;
        }

        .navbar-nav .nav-link:hover {
            color: #ffd166 !important;
        }
    </style>
</head>

<body>

    <div class="container py-4">

       
        <div class="row">
            <header class="col-12 bg-dark box text-center">
                <h1>My Webpage</h1>
                <p class="mb-0">Clean & Minimal Bootstrap Layout</p>
            </header>
        </div>

     
        <div class="row">
            <div class="col-12">
                <nav class="navbar navbar-expand-lg navbar-dark bg-primary px-3">
                    <a href="#" style="color: white; text-decoration: none;"><b>Navbar</b></a>

                    <div class="collapse navbar-collapse" id="navbarNav">
                        <div class="navbar-nav ms-auto">
                            <a class="nav-link active" href="#">Home</a>
                            <a class="nav-link" href="#">About</a>
                            <a class="nav-link" href="#">Services</a>
                            <a class="nav-link" href="#">Contact</a>
                        </div>
                    </div>
                </nav>
            </div>
        </div>

     
        <div class="row">
            <section class="col-lg-8">
                <div class="bg-white box">
                    <h2>Main Content</h2>
                    <p>
                        This is the main section of the webpage. You can add
                        text, images, cards, or any content here.
                    </p>

                    <button class="btn btn-primary">
                        Learn More
                    </button>
                </div>
            </section>

          
            <aside class="col-lg-4">
                <div class="bg-light box">
                    <h3>Sidebar</h3>
                    <ul class="list-group">
                        <li class="list-group-item">Dashboard</li>
                        <li class="list-group-item">Profile</li>
                        <li class="list-group-item">Settings</li>
                        <li class="list-group-item">Logout</li>
                    </ul>
                </div>
            </aside>
        </div>

        
        <div class="row">
            <footer class="col-12 bg-dark box text-center ">
                <p class="mb-0">
                    © 2026 My Webpage | Designed with Bootstrap
                </p>
            </footer>
        </div>

    </div>


</body>

</html>
